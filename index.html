<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autenticação</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e1e1e6;
        }

        .container {
            background-color: #202024;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #a8a8b3;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #323238;
            border-radius: 6px;
            font-size: 1rem;
            background-color: #121214;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #0066cc;
            background-color: #121214;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.3);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #ffffff;
            color: #121214;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: #e1e1e6;
        }

        .toggle-link {
            display: block;
            margin-top: 1.5rem;
            text-align: center;
            color: #0066cc;
            font-size: 0.875rem;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 1.25rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }

        .success {
            background-color: rgba(29, 201, 103, 0.1);
            color: #1dc967;
            border: 1px solid rgba(29, 201, 103, 0.2);
            display: block;
        }

        .error {
            background-color: rgba(247, 90, 90, 0.1);
            color: #f75a5a;
            border: 1px solid rgba(247, 90, 90, 0.2);
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="registerSection">
            <h2>Cadastrar Usuário</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regName">Nome Completo</label>
                    <input type="text" id="regName" placeholder="Ex: Matheus Cassioli">
                </div>
                <div class="form-group">
                    <label for="regEmail">E-mail</label>
                    <input type="email" id="regEmail" placeholder="Ex: matheus@dev.com">
                </div>
                <div class="form-group">
                    <label for="regPassword">Senha</label>
                    <input type="password" id="regPassword" placeholder="No mínimo 6 caracteres">
                </div>
                <button type="submit">Salvar Usuário</button>
            </form>
            <a class="toggle-link" onclick="switchForm('login')">Já tem uma conta? Faça Login</a>
        </div>

        <div id="loginSection" style="display: none;">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">E-mail</label>
                    <input type="email" id="loginEmail" placeholder="Digite seu e-mail">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input type="password" id="loginPassword" placeholder="Digite sua senha">
                </div>
                <button type="submit">Entrar</button>
            </form>
            <a class="toggle-link" onclick="switchForm('register')">Não tem conta? Cadastre-se</a>
        </div>

        <div id="responseMessage" class="message"></div>
    </div>

    <script>
        const registerSection = document.getElementById('registerSection');
        const loginSection = document.getElementById('loginSection');
        const messageDiv = document.getElementById('responseMessage');

        function switchForm(formType) {
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';
            if (formType === 'login') {
                registerSection.style.display = 'none';
                loginSection.style.display = 'block';
            } else {
                registerSection.style.display = 'block';
                loginSection.style.display = 'none';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3000/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.statusCode == 400 || data.statusCode == 409) {
                    messageDiv.textContent = data.message;
                    messageDiv.classList.add('error');
                    messageDiv.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    messageDiv.textContent = `Sucesso! Usuário criado com ID: ${data.id}`;
                    messageDiv.classList.add('success');
                    messageDiv.style.display = 'block';
                    document.getElementById('registerForm').reset();
                }
            } catch (error) {
                messageDiv.textContent = 'Erro de conexão. A API está rodando?';
                messageDiv.classList.add('error');
                messageDiv.style.display = 'block';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.status === 401 || data.statusCode == 400) {
                    messageDiv.textContent = data.message;
                    messageDiv.classList.add('error');
                    messageDiv.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    messageDiv.textContent = `Bem-vindo, ${data.name}! Login feito com sucesso.`;
                    messageDiv.classList.add('success');
                    messageDiv.style.display = 'block';
                    document.getElementById('loginForm').reset();
                }
            } catch (error) {
                messageDiv.textContent = 'Erro de conexão. A API está rodando?';
                messageDiv.classList.add('error');
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
