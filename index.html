<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #111;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #666;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fcfcfc;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #0066cc;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #333;
        }

        .message {
            margin-top: 1.25rem;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }

        .success {
            background-color: #e6f4ea;
            color: #137333;
            display: block;
        }

        .error {
            background-color: #fce8e6;
            color: #c5221f;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Cadastrar Usuário</h2>

        <form id="userForm">
            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" placeholder="Ex: Matheus Cassioli">
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Ex: matheus@dev.com">
            </div>

            <button type="submit">Salvar Usuário</button>
        </form>

        <div id="responseMessage" class="message"></div>
    </div>

    <script>
        const form = document.getElementById('userForm');
        const messageDiv = document.getElementById('responseMessage');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3000/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email })
                });

                const data = await response.json();

                if (data.statusCode == 400) { 
                    messageDiv.textContent = data.message;
                    messageDiv.classList.add('error');
                    messageDiv.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    messageDiv.textContent = `Sucesso! Usuário criado com ID: ${data.id}`;
                    messageDiv.classList.add('success');
                    form.reset();
                }
            }
            catch (error) {
                console.error(error, '<--- Erro de conexão');
                messageDiv.textContent = 'Erro de conexão. A API está rodando?';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>

</html>
