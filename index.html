<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Autenticação</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0a0a0c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ededed;
            padding: 1rem;
        }

        .container {
            background-color: #121214;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #222226;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 360px;
            overflow: hidden;
        }

        .fade-section {
            animation: fadeInSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.15rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #9494a1;
        }

        input {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid #26262b;
            border-radius: 6px;
            font-size: 0.9rem;
            background-color: #161619;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #161619;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            padding: 0.65rem;
            background-color: #ffffff;
            color: #0a0a0c;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: #e4e4e7;
        }

        .toggle-link {
            display: block;
            margin-top: 1.5rem;
            text-align: center;
            color: #9494a1;
            font-size: 0.8rem;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .toggle-link:hover {
            color: #ffffff;
        }

        .message {
            margin-top: 1.15rem;
            padding: 0.65rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            display: none;
            font-weight: 500;
        }

        .success {
            background-color: rgba(16, 185, 129, 0.06);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block;
        }

        .error {
            background-color: rgba(239, 68, 68, 0.06);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">

        <div id="responseMessage" class="message"></div>

        <div id="registerSection" class="fade-section" style="display: none;">
            <h3 style="text-align: center; padding:1rem ">Criar conta</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regName">Nome</label>
                        <input type="text" id="regName" placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">E-mail</label>
                        <input type="email" id="regEmail" placeholder="nome@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Senha</label>
                        <input type="password" id="regPassword" placeholder="No mínimo 6 caracteres">
                    </div>
                    <button type="submit">Cadastrar</button>
                </form>
                <a class="toggle-link" onclick="switchForm('login')">Já tem uma conta? Conecte-se</a>
        </div>

        <div id="loginSection" class="fade-section">
            <h3 style="text-align: center; padding:1rem ">Entrar na conta</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">E-mail</label>
                        <input type="email" id="loginEmail" placeholder="nome@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" placeholder="Sua senha">
                    </div>
                    <button type="submit">Acessar plataforma</button>
                </form>
                <a class="toggle-link" onclick="switchForm('register')">Não tem uma conta? Começar</a>
        </div>

    </div>

    <script>
        const registerSection = document.getElementById('registerSection');
        const loginSection = document.getElementById('loginSection');
        const messageDiv = document.getElementById('responseMessage');

        function switchForm(formType) {
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';

            if (formType === 'login') {
                registerSection.style.display = 'none';
                loginSection.style.display = 'block';

                loginSection.style.animation = 'none';
                loginSection.offsetHeight; /* trigger reflow */
                loginSection.style.animation = null;
            } else {
                registerSection.style.display = 'block';
                loginSection.style.display = 'none';
                registerSection.style.animation = 'none';
                registerSection.offsetHeight; /* trigger reflow */
                registerSection.style.animation = null;
            }
        }

        // ==========================================
        // CADASTRO (POST /users)
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3000/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.statusCode == 400 || data.statusCode == 409) {
                    messageDiv.textContent = data.message;
                    messageDiv.classList.add('error');
                    messageDiv.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    messageDiv.textContent = `Usuário criado com sucesso! Redirecionando para o login...`;
                    messageDiv.classList.add('success');
                    messageDiv.style.display = 'block';
                    document.getElementById('registerForm').reset();

                    // Altera suavemente para a tela de login após 1.5s
                    setTimeout(() => {
                        switchForm('login');
                    }, 1500);
                }
            } catch (error) {
                messageDiv.textContent = 'Não foi possível conectar ao servidor de segurança.';
                messageDiv.classList.add('error');
                messageDiv.style.display = 'block';
            }
        });

        // ==========================================
        // LOGIN (POST /auth/login)
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            console.log("1. Iniciando envio dos dados de autenticação...");

            try {
                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log("2. Resposta recebida da API NestJS:", data);

                if (response.status === 401 || data.statusCode == 400) {
                    messageDiv.textContent = data.message;
                    messageDiv.classList.add('error');
                    messageDiv.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    const token = data.access_token || data.token;

                    if (token) {
                        localStorage.setItem('token', token);
                        console.log("3. Token JWT guardado perfeitamente no localStorage.");
                    } else {
                        console.warn("Atenção: A resposta da API não contém propriedades conhecidas de token.");
                    }

                    messageDiv.textContent = `Autenticação bem-sucedida. Redirecionando...`;
                    messageDiv.classList.add('success');
                    messageDiv.style.display = 'block';
                    document.getElementById('loginForm').reset();

                    console.log("4. Ativando cronômetro de redirecionamento para dashboard.html...");
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            } catch (error) {
                console.error("Erro na comunicação fetch:", error);
                messageDiv.textContent = 'Não foi possível conectar ao servidor de segurança.';
                messageDiv.classList.add('error');
                messageDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
