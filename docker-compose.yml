version: "3.8"

services:
  db:
    image: postgres:15
    container_name: meu_banco_postgre
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=senha_dificil
      - POSTGRES_DB=meu_projeto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
